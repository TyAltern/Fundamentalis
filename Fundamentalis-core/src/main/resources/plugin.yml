name: fundamentalis-core
version: '${project.version}'
main: me.tyalternative.fundamentalis.core.FundamentalisCorePlugin
api-version: '1.21'
description: "Moteur RPG Fundamentalis - couche Core (stats, entités, persistance)"
authors: [ TyAlternative ]

# Le Core doit se charger en premier — tous les autres modules en dépendent
load: STARTUP

# Aucune dépendance externe obligatoire pour le Core
depend: [fundamentalis-api]
softdepend: []

commands:
  stats:
    description: "Consulter ou modifier les statistiques d'une cible"
    usage: "/stats [cible] | /stats set|add <cible> <stat> <valeur>"

permissions:
  fundamentalis.stats.set:
    description: "Permet de modifier les stats de base d'une cible via /stats set|add"
    default: op
